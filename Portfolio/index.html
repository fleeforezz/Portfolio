                    </div>
                    <div class="navigation-instagram">

                    </div>
                    <div class="navigation-linkedin">

            </div>

    <section>

                <div class="intro-child-row">
                    <span class="dev-position">Front-end Developer</span>
                    <h1 class="intro-heading">Make everything colorful is my calling 🧙‍♂️</h1>
                    <p class="intro-para"></p>
                </div>
